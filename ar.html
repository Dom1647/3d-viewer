<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Ansicht</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: white;
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
        }

        .header button {
            background: none;
            border: none;
            color: #667eea;
            font-size: 16px;
            cursor: pointer;
        }

        .header h1 {
            flex: 1;
            text-align: center;
            font-size: 17px;
            font-weight: 600;
        }

        model-viewer {
            flex: 1;
            width: 100%;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
        }

        .info-text {
            padding: 20px;
            text-align: center;
            color: #888;
            font-size: 14px;
            line-height: 1.6;
        }

        .info-text strong {
            color: #667eea;
        }

        #status {
            text-align: center;
            padding: 16px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="header">
        <button onclick="history.back()">← Zurück</button>
        <h1>AR Ansicht</h1>
        <div style="width:50px"></div>
    </div>

    <div id="status">⏳ Modell wird geladen...</div>

    <model-viewer
        id="ar-viewer"
        camera-controls
        touch-action="pan-y"
        auto-rotate
        ar
        ar-modes="webxr scene-viewer quick-look"
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral"
        style="display:none; flex:1; width:100%;"
    >
        <button slot="ar-button" style="
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            cursor: pointer;
        ">
            🚀 In AR starten
        </button>
    </model-viewer>

    <div class="info-text">
        Tippe auf <strong>„In AR starten"</strong> um das Modell in deiner Umgebung zu sehen.<br>
        Auf iPhones öffnet sich automatisch AR Quick Look.
    </div>

    <script type="module">
        import { db, collection, getDocs } from './firebase-config.js';

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');

        async function loadAR() {
            if (!id) {
                document.getElementById('status').textContent = 'Kein Modell angegeben';
                return;
            }

            try {
                const snapshot = await getDocs(collection(db, 'placements'));
                let placement = null;

                snapshot.forEach((docSnap) => {
                    if (docSnap.id === id) {
                        placement = docSnap.data();
                    }
                });

                if (placement) {
                    const viewer = document.getElementById('ar-viewer');
                    viewer.src = placement.modelUrl;
                    viewer.alt = placement.name;
                    viewer.style.display = 'block';
                    document.getElementById('status').textContent = placement.name || 'AR bereit';
                } else {
                    document.getElementById('status').textContent = 'Modell nicht gefunden';
                }
            } catch (error) {
                console.error('Fehler:', error);
                document.getElementById('status').textContent = 'Fehler: ' + error.message;
            }
        }

        loadAR();
    </script>
</body>
</html>
